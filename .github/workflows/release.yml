name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm run package

      - name: Rename artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv dist/krtr-${VERSION}-arm64-mac.zip "dist/krtr-${VERSION}-Apple-Silicon.zip"
          mv dist/krtr-${VERSION}-mac.zip "dist/krtr-${VERSION}-Intel.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_ARM=$(shasum -a 256 "dist/krtr-${VERSION}-Apple-Silicon.zip" | cut -d ' ' -f 1)
          SHA_INTEL=$(shasum -a 256 "dist/krtr-${VERSION}-Intel.zip" | cut -d ' ' -f 1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/fortkle/homebrew-krtr.git /tmp/homebrew-krtr

          cat > /tmp/homebrew-krtr/Casks/krtr.rb << CASK
          cask "krtr" do
            version "${VERSION}"

            on_arm do
              sha256 "${SHA_ARM}"
              url "https://github.com/fortkle/krtr/releases/download/v#{version}/krtr-#{version}-Apple-Silicon.zip"
            end

            on_intel do
              sha256 "${SHA_INTEL}"
              url "https://github.com/fortkle/krtr/releases/download/v#{version}/krtr-#{version}-Intel.zip"
            end

            name "krtr"
            desc "Screenshot and image annotation tool"
            homepage "https://github.com/fortkle/krtr"

            app "krtr.app"
          end
          CASK

          cd /tmp/homebrew-krtr
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/krtr.rb
          git commit -m "Update krtr to ${VERSION}"
          git push
