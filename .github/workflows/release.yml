name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm run package

      - name: Rename artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv dist/krtr-${VERSION}-arm64-mac.zip "dist/krtr-${VERSION}-Apple-Silicon.zip"
          mv dist/krtr-${VERSION}-mac.zip "dist/krtr-${VERSION}-Intel.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
